# Pulse config — local docker-compose simulation environment
#
# Run `docker compose up -d` in the docker/ directory first, then copy
# this file to the repo root as config.yml and execute ./pulse.
#
# All addresses resolve to localhost via the ports exposed by docker-compose.

services:
  zookeeper:
    - localhost:2181

  zk-ui:
    - localhost:9090

  kafka:
    - localhost:9092

nacos:
  addresses:
    - localhost:8848
  username: nacos
  password: nacos

redis:
  password: ""
  addresses:
    - localhost:6379

elasticsearch:
  addresses:
    - localhost:9200
  username: elastic
  password: changeme

kibana:
  addresses:
    - localhost:5601
  username: elastic
  password: changeme

minio:
  username: minioadmin
  password: minioadmin
  addresses:
    - localhost:9000
